name: Deploy Backend to Railway

on:
  push:
    branches:
      - develop
      - qa
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting (flake8)
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Check migrations
        run: |
          cd backend
          python manage.py makemigrations --check
        continue-on-error: true

      - name: Run tests
        run: |
          cd backend
          python manage.py test
        continue-on-error: true

  deploy-dev:
    name: Deploy to Dev (develop branch)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Railway (dev)
        uses: xano-io/github-action-railway@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID_DEV }}
          inputs: |
            PORT=8000

      - name: Run migrations
        run: |
          echo "Migrations will be run by Railway on startup"

  deploy-qa:
    name: Deploy to QA (qa branch)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/qa'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Railway (qa)
        uses: xano-io/github-action-railway@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID_QA }}
          inputs: |
            PORT=8000

  deploy-prod:
    name: Deploy to Production (main branch)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://api.redeem-rocket.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Railway (production)
        uses: xano-io/github-action-railway@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID_PROD }}
          inputs: |
            PORT=8000
            DEBUG=False

      - name: Notify deployment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Backend deployed to production'
            })
