name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # FIXED: Now runs the SAME build command that Vercel will use
      - name: Run build test (same as Vercel)
        run: npm run build:business
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # NEW: Verify output directory exists
      - name: Verify build output
        run: |
          if [ -d "dist-business" ]; then
            echo "✅ Build output verified in dist-business"
            ls -la dist-business | head -20
          else
            echo "❌ Build output not found in dist-business"
            exit 1
          fi

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # FIXED: DON'T delete .vercel - keep project context
      # Only clean specific cache directories if needed
      - name: Clean build cache (but keep .vercel)
        run: |
          rm -rf dist dist-business .next node_modules/.cache 2>/dev/null || true

      - name: Verify Vercel CLI
        run: |
          npm install -g vercel@latest
          vercel --version

      # FIXED: Use proper Vercel deployment with all flags
      - name: Deploy to Vercel (Production)
        run: |
          vercel deploy \
            --prod \
            --confirm \
            --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # FIXED: Only comment on actual pull requests
      - name: Comment on PR (only on pull_request events)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Production deployment successful! 🚀'
            })

      # NEW: Success notification
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Successfully deployed to production"
          echo "🔗 URL: https://redeemrocket.in"
